# Auto-load all dashboards in this directory.
apiVersion: 1

providers:
  - name: image-pipeline
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
