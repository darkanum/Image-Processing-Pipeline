name: image-processing-pipeline

# All services in this stack:
#   - redis            : BullMQ queue backend
#   - redis-commander  : Web UI for browsing the Redis queue (BullMQ keys)
#   - firebase-emulator: Firestore + Storage + Auth emulators (UI on :4001)
#   - api              : Express HTTP API (also exposes Prometheus /metrics)
#   - worker           : BullMQ worker that processes image jobs
#   - frontend         : Vite-built React app served by nginx
#   - prometheus       : Scrapes the API /metrics endpoint every 5s
#   - grafana          : Observability dashboard backed by Prometheus
#
# HOST PORT MAP (chosen to avoid clashes on a busy host):
#   frontend         127.0.0.1:8088 -> 80
#   api              127.0.0.1:3100 -> 3001
#   firebase UI      127.0.0.1:4001 -> 4000
#   firestore        127.0.0.1:8085 -> 8080
#   auth             127.0.0.1:9095 -> 9099
#   storage          127.0.0.1:9200 -> 9199
#   redis            127.0.0.1:6390 -> 6379
#   redis-commander  127.0.0.1:8081 -> 8081
#   prometheus       127.0.0.1:9090 -> 9090
#   grafana          127.0.0.1:3000 -> 3000  (default admin/admin)
#
# All host ports are bound to 127.0.0.1 (IPv4 only). Docker Desktop on
# Windows has a known issue where IPv6 port forwarding hangs — the
# browser resolves `localhost` to `::1` first and waits indefinitely.
# Binding to IPv4 only avoids that and makes `http://localhost:<port>`
# work via the 127.0.0.1 fallback.
#
# SECURITY: For production, set API_KEY to a strong random secret and
# ALLOWED_ORIGINS to your real frontend origin. As-shipped, the API is
# open and CORS is permissive (suitable for local dev only).
#
# If you need to move these, change ONLY the host side (left of `->`) here
# and `VITE_FIRESTORE_EMULATOR_HOST` / `VITE_FIREBASE_STORAGE_EMULATOR_HOST`
# / `VITE_FIREBASE_AUTH_EMULATOR_HOST` build args on the frontend service.
# Container-internal ports stay the same.

services:
  redis:
    image: redis:7-alpine
    container_name: pipeline-redis
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    ports:
      - "127.0.0.1:6390:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    # Hardening: drop capabilities, run as non-root user, no new privileges.
    security_opt:
      - no-new-privileges:true
    read_only: false   # redis needs to write its AOF
    # Cap memory so a runaway worker can't OOM the host.
    mem_limit: 256m

  firebase-emulator:
    build:
      context: ./firebase
    container_name: pipeline-firebase
    ports:
      - "127.0.0.1:4001:4000"   # emulator UI
      - "127.0.0.1:8085:8080"   # Firestore
      - "127.0.0.1:9095:9099"   # Auth
      - "127.0.0.1:9200:9199"   # Storage
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:4000/"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 2g     # JVM heap is hungry; 2g is the typical recommended cap

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pipeline-api
    depends_on:
      redis:
        condition: service_healthy
      firebase-emulator:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      LOG_LEVEL: info
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FIREBASE_PROJECT_ID: demo-image-pipeline
      # Container-to-container — uses service name and container port (8080).
      FIRESTORE_EMULATOR_HOST: firebase-emulator:8080
      FIREBASE_STORAGE_EMULATOR_HOST: firebase-emulator:9199
      FIREBASE_AUTH_EMULATOR_HOST: firebase-emulator:9099
      # Public URL the BROWSER uses to fetch stored images — must match the
      # firebase-emulator host port mapping for `storage` in this file.
      PUBLIC_STORAGE_HOST: http://localhost:9200
      WORKER_CONCURRENCY: 4
      JOB_MAX_IMAGE_BYTES: 10485760
      JOB_DOWNLOAD_TIMEOUT_MS: 20000
      JOB_HARD_TIMEOUT_MS: 120000
      JOB_TTL_HOURS: 24
      STORAGE_TTL_HOURS: 24
      # SECURITY: set this in a real deployment. Empty string = open API.
      API_KEY: ${API_KEY:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
    ports:
      - "127.0.0.1:3100:3001"
    # K8s-style probes wired through Docker's healthcheck.
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3001/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pipeline-worker
    depends_on:
      redis:
        condition: service_healthy
      firebase-emulator:
        condition: service_healthy
    command: ["node", "dist/worker-entry.js"]
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FIREBASE_PROJECT_ID: demo-image-pipeline
      FIRESTORE_EMULATOR_HOST: firebase-emulator:8080
      FIREBASE_STORAGE_EMULATOR_HOST: firebase-emulator:9199
      FIREBASE_AUTH_EMULATOR_HOST: firebase-emulator:9099
      PUBLIC_STORAGE_HOST: http://localhost:9200
      WORKER_CONCURRENCY: 4
      JOB_MAX_IMAGE_BYTES: 10485760
      JOB_DOWNLOAD_TIMEOUT_MS: 20000
      JOB_HARD_TIMEOUT_MS: 120000
      JOB_TTL_HOURS: 24
      STORAGE_TTL_HOURS: 24
    restart: unless-stopped
    # No healthcheck endpoint in the worker (it's a long-running consumer,
    # not a request server). K8s liveness would be a BullMQ ping or a
    # heartbeat metric.
    security_opt:
      - no-new-privileges:true
    # libvips + sharp can use a lot of memory when processing large images.
    mem_limit: 1g
    # Stop accepting new jobs after 30s of SIGTERM, force-kill after 40s.
    stop_grace_period: 30s
    stop_signal: SIGTERM

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Browser-side URLs — host ports match the mappings above.
        VITE_API_URL: http://localhost:3100
        VITE_FIREBASE_PROJECT_ID: demo-image-pipeline
        VITE_FIREBASE_API_KEY: demo-api-key
        VITE_FIRESTORE_EMULATOR_HOST: localhost:8085
        VITE_FIREBASE_STORAGE_EMULATOR_HOST: localhost:9200
        VITE_FIREBASE_AUTH_EMULATOR_HOST: localhost:9095
        # If API_KEY is set, the frontend sends it as X-Api-Key on every
        # request to /api/jobs.
        VITE_API_KEY: ${VITE_API_KEY:-}
    container_name: pipeline-frontend
    depends_on:
      - api
    ports:
      - "127.0.0.1:8088:80"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 64m

  # ── Observability: Redis UI, Prometheus, Grafana ──────────────────

  redis-commander:
    # Lightweight web UI for poking at the Redis queue — search keys
    # (try `bull:image-processing:*`), inspect values, watch the queue
    # drain in real time during a bulk submit. Runs with no auth in
    # dev — the UI is bound to 127.0.0.1 only, so it's not reachable
    # from outside the host.
    image: rediscommander/redis-commander:latest
    container_name: pipeline-redis-commander
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "127.0.0.1:8081:8081"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 128m

  prometheus:
    # Pulls the API's /metrics every 5s and stores them locally.
    # Browse raw time-series at http://localhost:9090
    image: prom/prometheus:v2.54.1
    container_name: pipeline-prometheus
    depends_on:
      - api
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m

  grafana:
    # Observability dashboard. Auto-provisions the Prometheus datasource
    # and the Image Processing Pipeline dashboard on first start.
    # Default login: admin / admin (you'll be asked to change it on
    # first login).
    image: grafana/grafana:11.2.0
    container_name: pipeline-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/provisioning/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m

volumes:
  redis-data:
  prometheus-data:
  grafana-data:
