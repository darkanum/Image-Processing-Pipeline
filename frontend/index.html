<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Real-Time Image Processing Pipeline</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply the persisted theme to <html data-theme="..."> BEFORE the
      // CSS loads, so the first paint is correctly themed and there's no
      // flash of the wrong color scheme. Mirrors the resolution logic
      // in useTheme.ts so the two stay in sync.
      (function () {
        try {
          var mode = localStorage.getItem("ipp.theme");
          if (mode !== "light" && mode !== "dark" && mode !== "system") mode = "system";
          var resolved;
          if (mode === "light") resolved = "light";
          else if (mode === "dark") resolved = "dark";
          else
            resolved = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          document.documentElement.setAttribute("data-theme", resolved);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
