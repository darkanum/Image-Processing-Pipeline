server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Never cache index.html — every page load should revalidate so the user
    # always gets the latest asset references after a deploy. Hashed assets
    # under /assets/ are immutable so they get the long cache (see below).
    location = / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
        try_files /index.html =404;
    }
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # SPA fallback — every unknown path goes through index.html (no cache).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed assets aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Health endpoint for docker healthcheck.
    location = /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
